<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotom Pokédex — Alola</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --red-hi:#e8000d;
  --red-mid:#c00008;
  --red-lo:#900005;
  --hinge:#555;
  --lcd-bg:#0d1f0f;
  --lcd-bg2:#081408;
  --lcd-green:#39ff68;
  --lcd-green2:#00d44a;
  --lcd-dim:#1a4a28;
  --lcd-dimmer:#0d2a16;
  --amber:#ffb800;
  --white:#f0ede6;
  --screen-frame:#1a1a1a;
  --btn-shadow:rgba(0,0,0,.5);
  --rs-bg:#1a2e1e; /* right screen bg */
  --rs-border:#254830;
}

body{
  background:radial-gradient(ellipse at center, #3a0a08 0%, #1a0404 100%);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;
}

/* ══════════════════════════════════════
   DEVICE SHELL
══════════════════════════════════════ */
.device{
  width:990px;height:640px;
  display:flex;
  filter:drop-shadow(0 24px 70px rgba(0,0,0,.9));
  position:relative;
}

/* ── LEFT HALF (red body) ── */
.half-left{
  width:470px;flex-shrink:0;
  background:linear-gradient(165deg, #f02418 0%, #c8000a 35%, #a00006 70%, #8a0004 100%);
  border-radius:24px 0 0 24px;
  border:2px solid #6a0003;
  border-right:none;
  display:flex;flex-direction:column;
  padding:16px 14px 12px;
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,120,100,.2), inset -4px 0 8px rgba(0,0,0,.3);
}
/* glossy top sheen */
.half-left::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);
  border-radius:24px 0 0 0;pointer-events:none;
}
/* camera dot */
.cam-dot{
  position:absolute;top:14px;right:22px;
  width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 33% 33%, #88ccff, #1155aa);
  border:2px solid #222;
  box-shadow:0 0 4px rgba(100,180,255,.4);
}

/* ── MAIN LCD SCREEN (left) ── */
.screen-wrap{
  background:var(--screen-frame);
  border-radius:8px;
  border:3px solid #111;
  box-shadow:inset 0 0 18px #000, 0 0 0 2px #444;
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
.lcd{
  background:var(--lcd-bg2);
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
/* scanlines */
.lcd::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 3px);
  pointer-events:none;z-index:50;
}

/* top bar */
.lcd-topbar{
  background:#060e07;padding:6px 10px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--lcd-dim);flex-shrink:0;
}
.rotom-eye{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 38% 35%, #fffacc, #ffd900 55%, #b07800);
  box-shadow:0 0 8px rgba(255,215,0,.5);
  position:relative;animation:blink 6s infinite;
}
.rotom-eye::after{
  content:'';position:absolute;
  width:8px;height:8px;background:#1a0a00;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
}
@keyframes blink{0%,90%,100%{transform:scaleY(1)}93%,97%{transform:scaleY(.06)}}
.lcd-title{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:2px;
  color:var(--lcd-green);text-shadow:0 0 6px var(--lcd-green2);
}

/* search */
.lcd-search{
  padding:5px 8px;background:#060e07;
  border-bottom:1px solid var(--lcd-dim);flex-shrink:0;
}
.lcd-search input{
  width:100%;background:#020804;
  border:1px solid var(--lcd-dim);border-radius:3px;
  color:var(--lcd-green);
  font-family:'Share Tech Mono',monospace;
  font-size:11px;padding:4px 8px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.lcd-search input:focus{border-color:var(--lcd-green2);box-shadow:0 0 6px rgba(0,212,74,.2)}
.lcd-search input::placeholder{color:var(--lcd-dim)}

/* list */
.poke-list{flex:1;overflow-y:auto;padding:2px 0;position:relative;z-index:1}
.poke-list::-webkit-scrollbar{width:3px}
.poke-list::-webkit-scrollbar-thumb{background:var(--lcd-dim)}
.poke-list::-webkit-scrollbar-track{background:transparent}
.poke-row{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;cursor:pointer;
  border-left:3px solid transparent;transition:background .1s;
}
.poke-row:hover{background:rgba(57,255,104,.07)}
.poke-row.active{background:rgba(57,255,104,.13);border-left-color:var(--lcd-green)}
.pr-num{font-family:'Share Tech Mono',monospace;font-size:10px;color:#2a7840;min-width:32px;flex-shrink:0}
.pr-thumb{width:30px;height:30px;image-rendering:pixelated;flex-shrink:0}
.pr-name{font-size:13px;font-weight:600;color:var(--white);flex:1}
.pr-types{display:flex;gap:2px;margin-left:auto}

/* status strip */
.lcd-status{
  background:#060e07;padding:4px 10px;
  border-top:1px solid var(--lcd-dim);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.led{width:5px;height:5px;background:var(--lcd-green);border-radius:50%;
  box-shadow:0 0 5px var(--lcd-green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.lcd-status span{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:#2a7840;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* buttons under left screen */
.left-btns{display:flex;gap:8px;margin-top:10px;justify-content:center}
.btn{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(0,0,0,.5);cursor:pointer;
  transition:filter .1s;box-shadow:0 2px 4px var(--btn-shadow);
}
.btn:hover{filter:brightness(1.3)}
.btn-r{background:#ff3a40}
.btn-a{background:var(--amber)}
.btn-g{background:var(--lcd-green)}

/* ── HINGE ── */
.hinge{
  width:24px;flex-shrink:0;
  background:linear-gradient(180deg,#3a3a3a,#222 40%,#3a3a3a);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;
  border-top:2px solid #444;border-bottom:2px solid #444;
  position:relative;z-index:2;
}
.hinge-bolt{
  width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #888, #333);
  border:1px solid #555;
}

/* ── RIGHT HALF (dark body) ── */
.half-right{
  flex:1;
  background:linear-gradient(160deg,#1e1e1e 0%,#141414 60%,#0e0e0e 100%);
  border-radius:0 24px 24px 0;
  border:2px solid #111;border-left:none;
  display:flex;flex-direction:column;
  padding:16px 16px 12px;
  box-shadow:inset 4px 0 8px rgba(0,0,0,.4);
}

/* ── RIGHT SCREEN ── */
.screen-right-wrap{
  background:#111;border-radius:8px;
  border:3px solid #0a0a0a;
  box-shadow:inset 0 0 20px rgba(0,0,0,.9), 0 0 0 2px #333;
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
.rs{
  background:var(--rs-bg);
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
/* scanlines right */
.rs::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 3px);
  pointer-events:none;z-index:50;
}

/* top bar right */
.rs-topbar{
  background:#0f1e12;padding:7px 12px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--rs-border);flex-shrink:0;
}
.rs-num{
  font-family:'Share Tech Mono',monospace;
  font-size:20px;color:var(--lcd-green);
  text-shadow:0 0 10px var(--lcd-green2);
  min-width:60px;letter-spacing:1px;
}
.rs-name{
  font-size:20px;font-weight:700;color:#e8f4e8;
  text-transform:uppercase;letter-spacing:1px;flex:1;
}
.rs-types{display:flex;gap:5px}

/* ── SHINY TOGGLE BUTTON ── */
.shiny-toggle{
  width:24px;height:24px;flex-shrink:0;
  background:rgba(255,255,255,.06);
  border:1px solid var(--rs-border);border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;margin-left:4px;
  transition:background .15s,border-color .15s,transform .1s;
}
.shiny-toggle:hover{background:rgba(255,210,60,.12);border-color:#c8a030}
.shiny-toggle:active{transform:scale(.92)}
.shiny-star{width:14px;height:14px;fill:#3a4a3a;transition:fill .15s}
.shiny-toggle[aria-pressed="true"]{
  background:rgba(255,210,60,.18);border-color:#ffd23c;
  box-shadow:0 0 8px rgba(255,210,60,.4);
}
.shiny-toggle[aria-pressed="true"] .shiny-star{
  fill:#ffd23c;filter:drop-shadow(0 0 3px rgba(255,210,60,.8));
}

/* ── SHINY BADGE (over sprite) ── */
.shiny-badge{
  position:absolute;top:8px;right:8px;z-index:3;
  font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:1px;color:#3a2a00;
  background:linear-gradient(135deg,#ffe178,#ffb800);
  padding:2px 7px;border-radius:10px;
  box-shadow:0 0 8px rgba(255,184,0,.6);
  opacity:0;transform:translateY(-4px) scale(.85);
  transition:opacity .2s,transform .2s;
  pointer-events:none;
}
.shiny-badge.show{opacity:1;transform:translateY(0) scale(1)}
/* golden glow on sprite column when shiny mode is active */
.rs-sprite-col.shiny-active{
  background:radial-gradient(ellipse at center, rgba(255,210,60,.08), #0d1a0f 70%);
}
.rs-sprite-col.shiny-active .main-sprite{
  filter:drop-shadow(0 0 16px rgba(255,210,60,.55));
}

/* ── MAIN CONTENT AREA ── */
.rs-body{
  flex:1;display:flex;overflow:hidden;position:relative;z-index:1;
}

/* sprite column */
.rs-sprite-col{
  width:170px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:10px 8px;
  border-right:1px solid var(--rs-border);
  background:#0d1a0f;
  position:relative;
}
/* subtle hex grid bg */
.rs-sprite-col::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle, rgba(57,255,104,.04) 1px, transparent 1px);
  background-size:18px 18px;
  pointer-events:none;
}
.main-sprite{
  width:148px;height:148px;
  image-rendering:auto;
  filter:drop-shadow(0 0 14px rgba(57,255,104,.35));
  animation:float 3.2s ease-in-out infinite;
  position:relative;z-index:1;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.sprite-scan{
  position:absolute;width:148px;height:2px;
  background:linear-gradient(90deg,transparent,var(--lcd-green),transparent);
  opacity:.55;animation:sweep 3.2s ease-in-out infinite;z-index:2;
}
@keyframes sweep{0%{top:20%;opacity:0}5%{opacity:.55}95%{opacity:.55}100%{top:80%;opacity:0}}

.sprite-mini-data{
  width:100%;margin-top:10px;position:relative;z-index:1;
}
.smd-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:2px 4px;border-bottom:1px solid #1a3020;
}
.smd-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a7040;letter-spacing:1px}
.smd-val{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--lcd-green)}

/* right info column */
.rs-info-col{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  padding:0;
}

/* stats section */
.rs-stats{
  padding:8px 12px;border-bottom:1px solid var(--rs-border);flex-shrink:0;
}
.stat-title{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  letter-spacing:2px;color:#ff8c40;margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.stat-title::before{content:'';width:12px;height:1px;background:#ff6a00}
.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.sn{font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a7040;width:26px;flex-shrink:0}
.sb-bg{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.sb-fill{height:100%;border-radius:3px;transition:width .5s ease}
.sv{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--lcd-green);width:24px;text-align:right;flex-shrink:0}

/* data grid */
.rs-datagrid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;padding:8px 12px;
  border-bottom:1px solid var(--rs-border);flex-shrink:0;
}
.dg-cell{
  background:#0d1a0f;border:1px solid #1a3020;border-radius:5px;
  padding:5px 8px;
}
.dg-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1.5px;color:#2a6040;margin-bottom:2px;text-transform:uppercase}
.dg-val{font-size:11px;font-weight:600;color:var(--lcd-green)}

/* description */
.rs-desc{
  flex:1;overflow-y:auto;padding:8px 12px;
}
.rs-desc::-webkit-scrollbar{width:3px}
.rs-desc::-webkit-scrollbar-thumb{background:var(--lcd-dim)}
.desc-lbl{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  letter-spacing:2px;color:#ff8c40;margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.desc-lbl::before{content:'';width:12px;height:1px;background:#ff6a00}
.desc-txt{font-size:12px;line-height:1.7;color:#c8e0c8;opacity:.9}

/* right bottom buttons */
.right-btns{
  display:flex;gap:0;margin-top:10px;justify-content:flex-end;align-items:center;gap:10px;
}
.dpad{
  width:56px;height:56px;position:relative;flex-shrink:0;
}
.dpad-h,.dpad-v{
  position:absolute;background:#2a2a2a;border-radius:3px;
  border:2px solid #111;box-shadow:0 2px 4px rgba(0,0,0,.5);
}
.dpad-h{width:56px;height:18px;top:50%;transform:translateY(-50%);left:0}
.dpad-v{height:56px;width:18px;left:50%;transform:translateX(-50%);top:0}
.dpad-center{
  position:absolute;width:18px;height:18px;background:#222;border-radius:2px;
  top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
}
.ab-btns{display:flex;gap:8px}
.ab-btn{
  width:30px;height:30px;border-radius:50%;
  font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(0,0,0,.5);cursor:pointer;color:#fff;
  box-shadow:0 3px 6px rgba(0,0,0,.4);transition:filter .1s;
}
.ab-btn:hover{filter:brightness(1.2)}
.ab-btn:active{transform:scale(.9)}
.ab-a{position:relative}
.ab-a.playing::after{
  content:'';position:absolute;inset:-4px;
  border-radius:50%;border:2px solid #ff6a40;
  animation:cryPulse .5s ease-out;
  pointer-events:none;
}
@keyframes cryPulse{
  0%{transform:scale(.7);opacity:.9}
  100%{transform:scale(1.6);opacity:0}
}
.ab-a{background:#c82000}
.ab-b{background:#0060c8}

/* ── TYPE BADGES ── */
.tbadge{
  font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;border:1px solid;
}

/* no results */
.no-res{padding:30px;text-align:center;color:var(--lcd-dim);font-family:'Share Tech Mono',monospace;font-size:11px}

/* ══════════════════════════════════════
   RESPONSIVE / MÓVIL
   El dispositivo pasa de "lado a lado" (landscape)
   a "apilado" (vertical) en pantallas estrechas.
══════════════════════════════════════ */
@media (max-width:880px){
  html,body{height:auto;min-height:100vh}
  body{
    overflow-y:auto;overflow-x:hidden;
    align-items:flex-start;
    padding:14px 0;
  }
  .device{
    width:100%;max-width:420px;height:auto;
    flex-direction:column;
    filter:drop-shadow(0 14px 40px rgba(0,0,0,.85));
  }

  /* left half becomes top half */
  .half-left{
    width:100%;border-radius:20px 20px 0 0;
    border:2px solid #6a0003;border-bottom:none;
    padding:14px 12px 10px;
  }
  .half-left::before{border-radius:20px 20px 0 0}

  /* fixed-height screen so the device doesn't become a single giant scroller */
  .screen-wrap{height:62vh;min-height:380px;max-height:520px}

  /* hinge becomes a horizontal divider */
  .hinge{
    width:100%;height:18px;
    flex-direction:row;justify-content:center;gap:18px;
    border-top:2px solid #444;border-bottom:2px solid #444;
    border-left:none;border-right:none;
  }

  /* right half becomes bottom half */
  .half-right{
    width:100%;border-radius:0 0 20px 20px;
    border:2px solid #111;border-top:none;
    padding:14px 12px 12px;
  }
  .screen-right-wrap{min-height:480px}

  .rs-body{flex-direction:column;overflow-y:auto}
  .rs-sprite-col{
    width:100%;border-right:none;
    border-bottom:1px solid var(--rs-border);
    padding:14px 8px;
  }
  .main-sprite{width:120px;height:120px}
  .sprite-scan{width:120px}

  .rs-info-col{overflow:visible}
  .rs-desc{flex:none;max-height:none}

  .rs-name{font-size:17px}
  .rs-num{font-size:17px;min-width:50px}

  /* d-pad/buttons stay tappable size */
  .ab-btn{width:36px;height:36px;font-size:13px}
  .dpad{width:64px;height:64px}
  .shiny-toggle{width:30px;height:30px}
  .shiny-star{width:17px;height:17px}
}

@media (max-width:420px){
  .device{max-width:100%;padding:0 6px}
  .screen-wrap{height:58vh;min-height:340px}
  .rs-name{font-size:15px}
  .lcd-title{font-size:9px}
  .pr-name{font-size:12px}
}

/* allow tap targets to feel native on touch devices */
@media (hover:none) and (pointer:coarse){
  .poke-row{padding:8px 10px}
  .ab-btn,.btn{cursor:default}
}
</style>
</head>
<body>
<div class="device">

  <!-- ═══════ LEFT HALF ═══════ -->
  <div class="half-left">
    <div class="cam-dot"></div>

    <div class="screen-wrap">
      <div class="lcd">

        <div class="lcd-topbar">
          <div class="rotom-eye"></div>
          <span class="lcd-title">ROTOM DEX · ALOLA</span>
        </div>

        <div class="lcd-search">
          <input id="searchInput" type="text" placeholder="Buscar nombre, nº o tipo…" oninput="filterList()">
        </div>

        <div class="poke-list" id="pokeList"></div>

        <div class="lcd-status">
          <div class="led"></div>
          <span id="statusTxt">SISTEMA ACTIVO · REGIÓN ALOLA</span>
          <span style="margin-left:auto;color:var(--lcd-dim)" id="cntTxt">86 PKM</span>
        </div>

      </div>
    </div>

    <div class="left-btns">
      <div class="btn btn-r"></div>
      <div class="btn btn-a"></div>
      <div class="btn btn-g"></div>
    </div>
  </div><!-- /half-left -->

  <!-- ═══════ HINGE ═══════ -->
  <div class="hinge">
    <div class="hinge-bolt"></div>
    <div class="hinge-bolt"></div>
  </div>

  <!-- ═══════ RIGHT HALF ═══════ -->
  <div class="half-right">

    <div class="screen-right-wrap">
      <div class="rs">

        <div class="rs-topbar">
          <div class="rs-num" id="rsNum">#722</div>
          <div class="rs-name" id="rsName">ROWLET</div>
          <div class="rs-types" id="rsTypes"></div>
          <button class="shiny-toggle" id="shinyToggle" type="button" title="Ver versión shiny" aria-pressed="false">
            <svg viewBox="0 0 24 24" class="shiny-star"><path d="M12 1l2.6 7.2L22 11l-7.4 2.8L12 21l-2.6-7.2L2 11l7.4-2.8z"/></svg>
          </button>
        </div>

        <div class="rs-body">

          <!-- SPRITE COLUMN -->
          <div class="rs-sprite-col">
            <div class="sprite-scan"></div>
            <div class="shiny-badge" id="shinyBadge">✨ SHINY</div>
            <img class="main-sprite" id="mainSprite" src="" alt="">
            <div class="sprite-mini-data" id="miniData"></div>
          </div>

          <!-- INFO COLUMN -->
          <div class="rs-info-col">

            <div class="rs-stats">
              <div class="stat-title">ESTADÍSTICAS BASE</div>
              <div id="statsRows"></div>

const STAT_N=['HP','ATK','DEF','SpA','SpD','SPD'];

// Múltiples fuentes por si alguna está bloqueada en la red del usuario.
// Orden: GitHub raw (PokeAPI) -> jsDelivr (mismo repo, CDN distinto) -> PokemonDB
function spriteThumbSources(id){
  return [
    `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`,
    `https://cdn.jsdelivr.net/gh/PokeAPI/sprites/sprites/pokemon/${id}.png`,
    `https://img.pokemondb.net/sprites/sword-shield/icon/${String(id).padStart(3,'0')}.png`
  ];
}
function spriteArtSources(id){
  return [
    `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`,
    `https://cdn.jsdelivr.net/gh/PokeAPI/sprites/sprites/pokemon/other/official-artwork/${id}.png`,
    `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
  ];
}
function spriteArtShinySources(id){
  return [
    `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${id}.png`,
    `https://cdn.jsdelivr.net/gh/PokeAPI/sprites/sprites/pokemon/other/official-artwork/shiny/${id}.png`,
    `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${id}.png`
  ];
}
// Engancha una cascada de fuentes a un <img>: si una falla (onerror), prueba la siguiente.
function loadWithFallback(img, sources){
  let i=0;
  img.onerror=()=>{
    i++;
    if(i<sources.length){ img.src=sources[i]; }
    else{ img.onerror=null; img.style.visibility='hidden'; }
  };
  img.style.visibility='visible';
  img.src=sources[0];
}

function crySources(id){
  return [
    `https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${id}.ogg`,
    `https://cdn.jsdelivr.net/gh/PokeAPI/cries/cries/pokemon/latest/${id}.ogg`,
    `https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/legacy/${id}.ogg`
  ];
}
// Reproduce el cry probando cada fuente en cascada hasta que una funcione.
function playCry(id){
  const sources=crySources(id);
  const btn=document.querySelector('.ab-a');
  let i=0;
  const tryPlay=()=>{
    const audio=new Audio(sources[i]);
    audio.volume=0.85;
    audio.addEventListener('error',()=>{
      i++;
      if(i<sources.length) tryPlay();
    });
    audio.play().catch(()=>{
      i++;
      if(i<sources.length) tryPlay();
    });
  };
  tryPlay();
  if(btn){
    btn.classList.remove('playing');
    requestAnimationFrame(()=>btn.classList.add('playing'));
    setTimeout(()=>btn.classList.remove('playing'),500);
  }
}
let curId=722, filtered=[...PKM], shinyMode=false;

// ── RENDER LIST ──────────────────────────────────────────────
function renderList(data){
  const el=document.getElementById('pokeList');
  el.innerHTML='';
  if(!data.length){el.innerHTML='<div class="no-res">Sin resultados</div>';return;}
  data.forEach(p=>{
    const d=document.createElement('div');
    d.className='poke-row'+(p.id===curId?' active':'');
    d.dataset.id=p.id;
    d.innerHTML=`<span class="pr-num">#${String(p.id).padStart(3,'0')}</span>
      <img class="pr-thumb" alt="${p.name}">
      <span class="pr-name">${p.name}</span>
      <div class="pr-types">${p.types.map(badge).join('')}</div>`;
    d.addEventListener('click',()=>select(p.id));
    el.appendChild(d);
    loadWithFallback(d.querySelector('.pr-thumb'), spriteThumbSources(p.id));
  });
  document.getElementById('cntTxt').textContent=`${data.length} / ${PKM.length}`;
}

// ── SELECT POKÉMON ───────────────────────────────────────────
function select(id){
  curId=id;
  const p=PKM.find(x=>x.id===id);
  if(!p) return;

  // list highlight
  document.querySelectorAll('.poke-row').forEach(r=>r.classList.toggle('active',+r.dataset.id===id));
  document.querySelector('.poke-row.active')?.scrollIntoView({block:'nearest'});

  // top bar
  document.getElementById('rsNum').textContent='#'+String(p.id).padStart(3,'0');
  document.getElementById('rsName').textContent=p.name;
  document.getElementById('rsTypes').innerHTML=p.types.map(badge).join('');

  // sprite — cascada de fuentes: artwork oficial (normal o shiny) -> sprite simple
  const img=document.getElementById('mainSprite');
  loadWithFallback(img, shinyMode ? spriteArtShinySources(p.id) : spriteArtSources(p.id));

  // mini data under sprite
  document.getElementById('miniData').innerHTML=`
    <div class="smd-row"><span class="smd-lbl">CATEG.</span><span class="smd-val">${p.cat}</span></div>
    <div class="smd-row"><span class="smd-lbl">HABIL.</span><span class="smd-val">${p.ability}</span></div>
    <div class="smd-row"><span class="smd-lbl">PESO</span><span class="smd-val">${p.w}</span></div>
    <div class="smd-row"><span class="smd-lbl">ALTURA</span><span class="smd-val">${p.h}</span></div>`;

  // stats
  const total=p.stats.reduce((a,b)=>a+b,0);
  document.getElementById('statsRows').innerHTML=p.stats.map((v,i)=>{
    const pct=Math.min(100,Math.round(v/255*100));
    return `<div class="stat-row">
      <span class="sn">${STAT_N[i]}</span>
      <div class="sb-bg"><div class="sb-fill" style="width:${pct}%;background:${statColor(v)}"></div></div>
      <span class="sv">${v}</span>
    </div>`;
  }).join('')+`<div class="stat-row" style="margin-top:2px;border-top:1px solid #1a3020;padding-top:3px">
    <span class="sn" style="color:#ff8c40">TOT</span>
    <div class="sb-bg"><div class="sb-fill" style="width:${Math.min(100,Math.round(total/780*100))}%;background:linear-gradient(90deg,#ff6a00,#ffcc00)"></div></div>
    <span class="sv" style="color:#ffcc00">${total}</span>
  </div>`;

  // data grid
  document.getElementById('dataGrid').innerHTML=`
    <div class="dg-cell"><div class="dg-lbl">Categoría</div><div class="dg-val">${p.cat}</div></div>
    <div class="dg-cell"><div class="dg-lbl">Habilidad</div><div class="dg-val">${p.ability}</div></div>
    <div class="dg-cell"><div class="dg-lbl">Peso</div><div class="dg-val">${p.w}</div></div>
    <div class="dg-cell"><div class="dg-lbl">Altura</div><div class="dg-val">${p.h}</div></div>`;

  // description
  document.getElementById('descTxt').textContent=p.desc;
  document.getElementById('statusTxt').textContent=`DATOS CARGADOS · ${p.name.toUpperCase()}`;
}

// ── FILTER ───────────────────────────────────────────────────
function filterList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  filtered=PKM.filter(p=>
    p.name.toLowerCase().includes(q)||
    String(p.id).includes(q)||
    p.types.some(t=>t.toLowerCase().includes(q))||
    p.cat.toLowerCase().includes(q)
  );
  renderList(filtered);
}

// ── SHINY TOGGLE ─────────────────────────────────────────────
function applyShinyUI(){
  document.getElementById('shinyToggle').setAttribute('aria-pressed', shinyMode);
  document.getElementById('shinyBadge').classList.toggle('show', shinyMode);
  document.querySelector('.rs-sprite-col').classList.toggle('shiny-active', shinyMode);
}
document.getElementById('shinyToggle').addEventListener('click',()=>{
  shinyMode=!shinyMode;
  applyShinyUI();
  select(curId);
});
document.querySelector('.ab-a').addEventListener('click',()=>playCry(curId));

// ── KEYBOARD NAV ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  const i=filtered.findIndex(p=>p.id===curId);
  if(e.key==='ArrowDown'&&i<filtered.length-1) select(filtered[i+1].id);
  if(e.key==='ArrowUp'  &&i>0)                  select(filtered[i-1].id);
  if(e.key.toLowerCase()==='s') document.getElementById('shinyToggle').click();
  if(e.key.toLowerCase()==='a') playCry(curId);
});

// ── INIT ─────────────────────────────────────────────────────
renderList(PKM);
select(722);
</script>
